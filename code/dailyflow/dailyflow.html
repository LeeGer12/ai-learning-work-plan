<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyFlow - 工作日报助手</title>
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #F8F9FC;
      color: #111827;
      min-height: 100vh;
    }

    /* ========== 顶部导航栏 ========== */
    .top-bar {
      background: #FFFFFF;
      height: 56px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #3B82F6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .logo-sub {
      font-size: 12px;
      color: #6B7280;
      margin-left: 4px;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .search-box {
      position: relative;
      width: 280px;
    }

    .search-input {
      width: 100%;
      height: 36px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 0 14px 0 36px;
      font-size: 13px;
      color: #111827;
      background: #F8F9FC;
      outline: none;
      transition: all 0.15s;
    }

    .search-input::placeholder {
      color: #9CA3AF;
    }

    .search-input:focus {
      background: #FFFFFF;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      color: #9CA3AF;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .search-clear:hover {
      background: #E5E7EB;
      color: #374151;
    }

    .search-clear.visible {
      display: flex;
    }

    .search-highlight {
      background: #FEF08A;
      border-radius: 2px;
      padding: 0 1px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #9CA3AF;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .template-btn {
      height: 36px;
      padding: 0 14px;
      background: #FFFFFF;
      color: #374151;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .template-btn:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .date-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #E5E7EB;
      background: #FFFFFF;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #374151;
      transition: all 0.15s;
    }

    .date-btn:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    .date-display {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      min-width: 200px;
      text-align: center;
    }

    .date-weekday {
      font-size: 12px;
      color: #6B7280;
      font-weight: 400;
    }

    /* ========== 主内容区 ========== */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      gap: 24px;
      min-height: calc(100vh - 56px);
    }

    /* ========== 左侧：日历导航 ========== */
    .calendar-section {
      width: 290px;
      min-width: 290px;
    }

    .calendar-card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 28px 28px 24px;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-month {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-nav-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: #F3F4F6;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #374151;
      transition: all 0.15s;
    }

    .calendar-nav-btn:hover {
      background: #E5E7EB;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      margin-bottom: 8px;
    }

    .calendar-weekday {
      font-size: 11px;
      color: #9CA3AF;
      text-align: center;
      padding: 0;
      font-weight: 400;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px 0;
      caret-color: transparent;
    }

    .calendar-day-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
    }

    .calendar-day-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .calendar-day-circle:hover {
      background: #F3F4F6;
    }

    .calendar-day-num {
      font-size: 11px;
      color: #6B7280;
      font-weight: 400;
      line-height: 1;
    }

    /* 有记录的日期：蓝底白字 + 表情 */
    .calendar-day-circle.has-record {
      background: #3B82F6;
    }

    .calendar-day-circle.has-record .day-emoji {
      font-size: 14px;
      line-height: 1;
    }

    .calendar-day-wrapper.has-record .calendar-day-num {
      color: #3B82F6;
      font-weight: 600;
    }

    /* 今天 */
    .calendar-day-circle.today {
      background: #3B82F6;
    }

    .calendar-day-circle.today .day-emoji {
      font-size: 14px;
      line-height: 1;
    }

    .calendar-day-wrapper.today .calendar-day-num {
      color: #3B82F6;
      font-weight: 600;
    }

    /* 其他月份 */
    .calendar-day-num.other-month {
      color: #D1D5DB;
    }

    /* ========== 中间：待办列表 ========== */
    .todo-section {
      flex: 1;
      min-width: 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #F3F4F6;
      margin-bottom: 4px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .icon {
      font-size: 18px;
    }

    .todo-count {
      font-size: 12px;
      color: #6B7280;
      background: #F3F4F6;
      padding: 2px 10px;
      border-radius: 12px;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sort-btn {
      height: 26px;
      padding: 0 10px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      background: #FFFFFF;
      font-size: 11px;
      color: #6B7280;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sort-btn:hover {
      border-color: #3B82F6;
      color: #3B82F6;
    }

    /* ========== 待办卡片 ========== */
    .todo-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 4px 0;
      margin-bottom: 16px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 16px;
      transition: background 0.15s;
      border-radius: 8px;
      margin: 4px 8px;
    }

    .todo-item:hover {
      background: #F8F9FC;
    }

    .todo-item:hover .todo-delete {
      opacity: 1;
    }

    .todo-item:hover .drag-handle {
      opacity: 1;
    }

    .todo-item.dragging {
      opacity: 0.4;
      background: #EFF6FF;
    }

    .todo-item.drag-over {
      border-top: 2px solid #3B82F6;
    }

    /* 拖拽手柄 */
    .drag-handle {
      width: 18px;
      height: 18px;
      min-width: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      color: #D1D5DB;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
      margin-top: 1px;
      user-select: none;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    /* 复选框 */
    .checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid #D1D5DB;
      border-radius: 4px;
      margin-top: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .checkbox:hover {
      border-color: #3B82F6;
    }

    .checkbox.checked {
      background: #3B82F6;
      border-color: #3B82F6;
    }

    .checkbox.checked::after {
      content: "✓";
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    /* 待办内容 */
    .todo-content {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 14px;
      color: #111827;
      line-height: 1.5;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #9CA3AF;
    }

    .todo-note {
      font-size: 12px;
      color: #6B7280;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .todo-note .note-icon {
      font-size: 12px;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .todo-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .tag-project {
      background: #EFF6FF;
      color: #3B82F6;
    }

    .tag-urgent {
      background: #FEF2F2;
      color: #EF4444;
    }

    .tag-important {
      background: #FFF7ED;
      color: #F59E0B;
    }

    .tag-normal {
      background: #F3F4F6;
      color: #6B7280;
    }

    /* 操作按钮 */
    .todo-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .todo-action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #9CA3AF;
      transition: all 0.15s;
    }

    .todo-action-btn:hover {
      background: #F3F4F6;
      color: #374151;
    }

    .todo-action-btn.delete:hover {
      background: #FEF2F2;
      color: #EF4444;
    }

    /* ========== 添加待办 ========== */
    .add-todo {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .add-todo-main {
      display: flex;
      gap: 8px;
    }

    .add-input {
      flex: 1;
      height: 40px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      color: #111827;
      background: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-input::placeholder {
      color: #9CA3AF;
    }

    .add-input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .add-btn {
      height: 40px;
      padding: 0 20px;
      background: #3B82F6;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #2563EB;
    }

    .add-todo-options {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .option-select {
      height: 32px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 12px;
      color: #374151;
      background: #FFFFFF;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .option-select:focus {
      border-color: #3B82F6;
    }

    .option-label {
      font-size: 12px;
      color: #9CA3AF;
    }

    .manage-projects-btn {
      height: 32px;
      padding: 0 10px;
      border: 1px dashed #D1D5DB;
      border-radius: 6px;
      background: transparent;
      font-size: 12px;
      color: #6B7280;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: auto;
    }

    .manage-projects-btn:hover {
      border-color: #3B82F6;
      color: #3B82F6;
    }

    /* 快捷模板 */
    .template-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .template-chip {
      height: 30px;
      padding: 0 12px;
      border: 1px solid #E5E7EB;
      border-radius: 15px;
      background: #FFFFFF;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .template-chip:hover {
      border-color: #3B82F6;
      color: #3B82F6;
      background: #EFF6FF;
    }

    .template-chip .chip-delete {
      font-size: 14px;
      color: #9CA3AF;
      margin-left: 2px;
      line-height: 1;
    }

    .template-chip .chip-delete:hover {
      color: #EF4444;
    }

    .manage-templates-btn {
      height: 30px;
      padding: 0 10px;
      border: 1px dashed #D1D5DB;
      border-radius: 15px;
      background: transparent;
      font-size: 12px;
      color: #6B7280;
      cursor: pointer;
      transition: all 0.15s;
    }

    .manage-templates-btn:hover {
      border-color: #3B82F6;
      color: #3B82F6;
    }

    /* ========== 右侧：侧边栏 ========== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 快捷操作卡片 */
    .action-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .action-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      width: 100%;
      height: 44px;
      background: #3B82F6;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 10px;
    }

    .btn-primary:hover {
      background: #2563EB;
    }

    .btn-secondary {
      width: 100%;
      height: 40px;
      background: #FFFFFF;
      color: #374151;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    /* 时间轴 */
    .timeline-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .timeline-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      position: relative;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 24px;
      bottom: -12px;
      width: 2px;
      background: #E5E7EB;
    }

    .timeline-item:last-child::before {
      display: none;
    }

    .timeline-dot {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      z-index: 1;
    }

    .timeline-dot.add {
      background: #EFF6FF;
    }

    .timeline-dot.complete {
      background: #ECFDF5;
    }

    .timeline-dot.edit {
      background: #FFF7ED;
    }

    .timeline-info {
      flex: 1;
      min-width: 0;
    }

    .timeline-text {
      font-size: 13px;
      color: #374151;
      line-height: 1.4;
    }

    .timeline-time {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 2px;
    }

    .timeline-delete {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .timeline-item:hover .timeline-delete {
      opacity: 1;
    }

    .timeline-delete:hover {
      background: #FEF2F2;
      color: #EF4444;
    }

    .timeline-toggle {
      text-align: center;
      font-size: 12px;
      color: #3B82F6;
      cursor: pointer;
      padding: 8px 0 0;
      user-select: none;
    }

    .timeline-toggle:hover {
      text-decoration: underline;
    }

    /* 本周概览 */
    .week-stats-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .week-stats-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .week-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 80px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .week-bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .week-bar {
      width: 100%;
      background: #E5E7EB;
      border-radius: 4px 4px 0 0;
      position: relative;
      min-height: 4px;
    }

    .week-bar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #3B82F6;
      border-radius: 4px 4px 0 0;
      transition: height 0.3s ease;
    }

    .week-bar-label {
      font-size: 11px;
      color: #6B7280;
    }

    .week-summary {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid #F3F4F6;
    }

    .week-summary-item {
      text-align: center;
    }

    .week-summary-value {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .week-summary-label {
      font-size: 11px;
      color: #6B7280;
      margin-top: 2px;
    }

    /* 统计卡片 */
    .stats-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;

  <script>
    // ========== 1.2 数据模型 ==========

    // UUID生成
    function generateId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // 创建Todo对象
    function createTodo(text, project = '', priority = 'normal') {
      return {
        id: generateId(),
        text: text,
        completed: false,
        project: project,
        priority: priority, // urgent | important | normal
        note: '',
        createdAt: new Date().toISOString(),
        completedAt: null
      };
    }

    // 创建TimelineEvent对象
    function createTimelineEvent(type, todoId, description) {
      return {
        id: generateId(),
        type: type, // add | complete | edit | delete
        todoId: todoId,
        timestamp: new Date().toISOString(),
        description: description
      };
    }

    // 初始数据结构
    function getInitialData() {
      return {
        todos: {},        // { "2026-06-16": [todo1, todo2, ...] }
        projects: ['获嘉名仕', '3号楼', '日常'],
        templates: [
          { id: generateId(), name: '对接甲方', text: '对接甲方，确认方案' },
          { id: generateId(), name: '方案深化', text: '方案深化设计' },
          { id: generateId(), name: '工地巡场', text: '工地巡场，跟进进度' }
        ],
        timeline: {}      // { "2026-06-16": [event1, event2, ...] }
      };
    }

    // 日期格式化工具
    function formatDate(date) {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDateChinese(date) {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      return `${year}年${month}月${day}日`;
    }

    function getWeekday(date) {
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return days[new Date(date).getDay()];
    }

    console.log('DailyFlow 数据模型已加载');

    // ========== 1.3 localStorage封装 ==========

    const STORAGE_KEY = 'dailyflow_data';

    // 保存数据到localStorage
    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch (e) {
        console.error('保存数据失败:', e);
        return false;
      }
    }

    // 从localStorage读取数据
    function loadData() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
          return JSON.parse(data);
        }
        // 首次使用，返回初始数据
        const initialData = getInitialData();
        saveData(initialData);
        return initialData;
      } catch (e) {
        console.error('读取数据失败:', e);
        return getInitialData();
      }
    }

    // 获取指定日期的待办列表
    function getTodosByDate(dateStr) {
      const data = loadData();
      return data.todos[dateStr] || [];
    }

    // 保存指定日期的待办列表
    function saveTodosByDate(dateStr, todos) {

    // 添加待办
    function addTodo(dateStr, text, project, priority) {
      const data = loadData();
      if (!data.todos[dateStr]) {
        data.todos[dateStr] = [];
      }
      const todo = createTodo(text, project, priority);
      data.todos[dateStr].push(todo);

      // 添加时间轴事件
      if (!data.timeline[dateStr]) {
        data.timeline[dateStr] = [];
      }
      data.timeline[dateStr].push(createTimelineEvent('add', todo.id, `添加待办「${text}」`));

      saveData(data);
      return todo;
    }

    // 切换待办完成状态
    function toggleTodo(dateStr, todoId) {
      const data = loadData();
      const todos = data.todos[dateStr] || [];
      const todo = todos.find(t => t.id === todoId);

      if (todo) {
        todo.completed = !todo.completed;
        todo.completedAt = todo.completed ? new Date().toISOString() : null;

        // 添加时间轴事件
        if (!data.timeline[dateStr]) {
          data.timeline[dateStr] = [];
        }
        const eventType = todo.completed ? 'complete' : 'add';
        const eventDesc = todo.completed ? `完成「${todo.text}」` : `重新打开「${todo.text}」`;
        data.timeline[dateStr].push(createTimelineEvent(eventType, todo.id, eventDesc));

        saveData(data);
      }
      return todo;
    }

    // 删除待办
    function deleteTodo(dateStr, todoId) {
      const data = loadData();
      const todos = data.todos[dateStr] || [];
      const index = todos.findIndex(t => t.id === todoId);

      if (index > -1) {
        const deletedTodo = todos.splice(index, 1)[0];

        // 添加时间轴事件
        if (!data.timeline[dateStr]) {
          data.timeline[dateStr] = [];
        }
        data.timeline[dateStr].push(createTimelineEvent('delete', todoId, `删除待办「${deletedTodo.text}」`));

        saveData(data);
        return deletedTodo;
      }
      return null;
    }

    // 按优先级排序（手动触发）
    function sortTodosByPriority() {
      const dateStr = formatDate(currentDate);
      const data = loadData();
      const todos = data.todos[dateStr];
      if (!todos || todos.length === 0) return;

      todos.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return (PRIORITY_ORDER[a.priority] ?? 2) - (PRIORITY_ORDER[b.priority] ?? 2);
      });

      data.todos[dateStr] = todos;
      saveData(data);
      renderTodoList();
      showToast('已按优先级排序');
    }

                ${todo.priority === 'urgent' ? '<span class="todo-tag tag-urgent">紧急</span>' : ''}

    // ========== 阶段二：日历导航 ==========

    // 日历状态
    let calendarMonth = currentDate.getMonth();

    // 表情列表（用于有记录的日期）
    const emojis = ['😊', '😄', '😌', '😎', '🤩', '✨', '💪', '🎯'];

    // 随机获取一个表情
    function getRandomEmoji(dateStr) {
      // 使用日期作为种子，确保同一天显示相同表情
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash = hash & hash;
      }
      return emojis[Math.abs(hash) % emojis.length];
    }

    // 渲染日历
    function renderCalendar() {
      const calendarDays = document.getElementById('calendarDays');
      const calendarMonthEl = document.getElementById('calendarMonth');

      // 更新月份显示
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
      calendarMonthEl.textContent = `${monthNames[calendarMonth]} ${calendarYear}`;

      // 计算月份信息
      const firstDay = new Date(calendarYear, calendarMonth, 1);
      const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
      const daysInMonth = lastDay.getDate();

      // 计算第一天是周几（周一为0）
      let startDay = firstDay.getDay() - 1;
      if (startDay < 0) startDay = 6;

      // 获取上个月末尾几天
      const prevMonthLastDay = new Date(calendarYear, calendarMonth, 0).getDate();

      // 获取今天日期
      const today = new Date();
      const todayStr = formatDate(today);

      // 获取当前选中日期
      const selectedStr = formatDate(currentDate);

      // 获取有待办的日期
      const data = loadData();
      const datesWithTodos = new Set(Object.keys(data.todos).filter(key => data.todos[key].length > 0));

      let html = '';
      let dayCount = 1;
      let nextMonthDay = 1;

      // 渲染6行
      for (let row = 0; row < 6; row++) {
        // 渲染7列
        for (let col = 0; col < 7; col++) {
          const index = row * 7 + col;

          if (index < startDay) {
            // 上个月的日期
            const prevDay = prevMonthLastDay - startDay + index + 1;
            const prevMonth = calendarMonth === 0 ? 11 : calendarMonth - 1;
            const prevYear = calendarMonth === 0 ? calendarYear - 1 : calendarYear;
            const prevDateStr = `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}-${String(prevDay).padStart(2, '0')}`;

            html += renderCalendarDay(prevDay, prevDateStr, true, false, false, datesWithTodos.has(prevDateStr));
          } else if (dayCount <= daysInMonth) {
            // 本月的日期
            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(dayCount).padStart(2, '0')}`;
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedStr;
            const hasRecord = datesWithTodos.has(dateStr);

            html += renderCalendarDay(dayCount, dateStr, false, isToday, isSelected, hasRecord);
            dayCount++;
          } else {
            // 下个月的日期
            const nextMonth = calendarMonth === 11 ? 0 : calendarMonth + 1;
            const nextYear = calendarMonth === 11 ? calendarYear + 1 : calendarYear;
            const nextDateStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(nextMonthDay).padStart(2, '0')}`;

            html += renderCalendarDay(nextMonthDay, nextDateStr, true, false, false, datesWithTodos.has(nextDateStr));
            nextMonthDay++;
          }
        }
      }

      calendarDays.innerHTML = html;
    }

    // 渲染单个日历日期
    function renderCalendarDay(day, dateStr, isOtherMonth, isToday, isSelected, hasRecord) {
      let wrapperClass = 'calendar-day-wrapper';
      let circleClass = 'calendar-day-circle';
      let numClass = 'calendar-day-num';
      let emoji = '';

      if (isOtherMonth) {
        numClass += ' other-month';
      }

      if (isToday) {
        wrapperClass += ' today';
        circleClass += ' today';
        emoji = getRandomEmoji(dateStr);
      } else if (hasRecord && !isOtherMonth) {
        wrapperClass += ' has-record';
        circleClass += ' has-record';
        emoji = getRandomEmoji(dateStr);
      }

      return `
        <div class="${wrapperClass}" data-date="${dateStr}">
          <div class="${circleClass}">
            ${emoji ? `<span class="day-emoji">${emoji}</span>` : ''}
          </div>
          <span class="${numClass}">${day}</span>
        </div>
      `;
    }

        return false;

      saveData(data);
      renderProjectSelect();

    // 6.3 JSON导出
    function exportToJSON() {
      const data = loadData();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      const dateStr = formatDate(new Date());
      a.href = url;
      a.download = `dailyflow-backup-${dateStr}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // 记录备份时间
      localStorage.setItem('dailyflow_last_backup', Date.now().toString());
      showToast('备份文件已下载');
    }

    // 备份提醒检查
    function checkBackupReminder() {
      const lastBackup = localStorage.getItem('dailyflow_last_backup');
      if (!lastBackup) {
        // 从未备份过，延迟 3 秒后提醒（不打扰首次打开）
        setTimeout(() => {
          showToast('⚠️ 建议导出备份，防止数据丢失');
        }, 3000);
        return;
      }

      const daysSince = (Date.now() - parseInt(lastBackup)) / (1000 * 60 * 60 * 24);
      if (daysSince >= 1) {
        setTimeout(() => {
          showToast('⚠️ 超过 1 天未备份，建议导出');
        }, 3000);
      }
    }

    // 6.4 JSON导入
    function importFromJSON(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          // 基本校验
          if (!data.todos || !data.projects) {
            showToast('文件格式不正确');
            return;
          }
          if (!confirm('导入将覆盖当前所有数据，确定继续吗？')) return;
          saveData(data);
          // 刷新所有视图
          renderProjectSelect();
          renderTodoList();
          renderTimeline();
          renderCalendar();
          showToast('数据已恢复');
        } catch (err) {
          showToast('文件解析失败');
        }
      };
      reader.readAsText(file);
    }

    // ==================== 拖拽排序
    let draggedItemId = null;

    function reorderTodos(dateStr, fromId, toId) {
      const data = loadData();
      const todos = data.todos[dateStr];
      if (!todos) return;

      const fromIdx = todos.findIndex(t => t.id === fromId);
      const toIdx = todos.findIndex(t => t.id === toId);
      if (fromIdx === -1 || toIdx === -1) return;

      const [moved] = todos.splice(fromIdx, 1);
      todos.splice(toIdx, 0, moved);
      data.todos[dateStr] = todos;
      saveData(data);
    }

    function initDragDropEvents() {
      const todoList = document.getElementById('todoList');

      todoList.addEventListener('dragstart', (e) => {
        const item = e.target.closest('.todo-item');
        if (!item) return;
        draggedItemId = item.dataset.id;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      todoList.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const item = e.target.closest('.todo-item');
        if (!item || item.dataset.id === draggedItemId) return;

        // 清除其他 drag-over 样式
        todoList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        item.classList.add('drag-over');
      });

      todoList.addEventListener('dragleave', (e) => {
        const item = e.target.closest('.todo-item');
        if (item) item.classList.remove('drag-over');
      });

      todoList.addEventListener('drop', (e) => {
        e.preventDefault();
        const item = e.target.closest('.todo-item');
        if (!item || !draggedItemId) return;

        const targetId = item.dataset.id;
        if (targetId !== draggedItemId) {
          const dateStr = formatDate(currentDate);
          reorderTodos(dateStr, draggedItemId, targetId);
          renderTodoList();
          renderTimeline();
        }

        // 清理样式
        todoList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });

      todoList.addEventListener('dragend', (e) => {
        const item = e.target.closest('.todo-item');
        if (item) item.classList.remove('dragging');
        todoList.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        draggedItemId = null;
      });
    }

    // ==================== 周统计
    function getWeekDates() {
      const today = new Date();
      const dayOfWeek = today.getDay(); // 0=周日, 1=周一...
      const monday = new Date(today);
      monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(formatDate(d));
      }
      return dates;
    }

    function renderWeekStats() {
      const weekDates = getWeekDates();
      const dayLabels = ['一', '二', '三', '四', '五', '六', '日'];

      let totalCompleted = 0;
      let totalTodos = 0;
      const weekProjects = new Set();

      const chartEl = document.getElementById('weekChart');
      chartEl.innerHTML = '';

      weekDates.forEach((date, i) => {
        const todos = getTodosByDate(date);
        const total = todos.length;
        const completed = todos.filter(t => t.completed).length;

        totalTodos += total;
        totalCompleted += completed;
        todos.forEach(t => { if (t.project) weekProjects.add(t.project); });

        const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

        const wrapper = document.createElement('div');
        wrapper.className = 'week-bar-wrapper';

        const bar = document.createElement('div');
        bar.className = 'week-bar';
        bar.style.height = '60px';
        bar.title = `${completed}/${total} (${rate}%)`;

        const fill = document.createElement('div');
        fill.className = 'week-bar-fill';
        fill.style.height = rate + '%';
        bar.appendChild(fill);

        const label = document.createElement('div');
        label.className = 'week-bar-label';
        label.textContent = dayLabels[i];

        wrapper.appendChild(bar);
        wrapper.appendChild(label);
        chartEl.appendChild(wrapper);
      });

      const weekRate = totalTodos > 0 ? Math.round((totalCompleted / totalTodos) * 100) : 0;

      document.getElementById('weekTotal').textContent = totalCompleted;
      document.getElementById('weekRate').textContent = weekRate + '%';
      document.getElementById('weekProjects').textContent = weekProjects.size;
    }

    // ========== 阶段七：搜索筛选 ==========

    // 搜索状态
    let searchQuery = '';
    let searchProjectFilter = '';

    // 高亮匹配文本
    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return escaped.replace(regex, '<span class="search-highlight">$1</span>');
    }

    // 跨日期搜索待办
    function searchTodos(query, projectFilter) {
      const data = loadData();
      const results = [];
      const q = query.toLowerCase();

      for (const [dateStr, todos] of Object.entries(data.todos)) {
        for (const todo of todos) {
          const matchText = todo.text.toLowerCase().includes(q);
          const matchNote = (todo.note || '').toLowerCase().includes(q);
          const matchProject = (todo.project || '').toLowerCase().includes(q);
          const projectMatch = !projectFilter || todo.project === projectFilter;

          if (projectMatch && (matchText || matchNote || matchProject)) {
            results.push({ ...todo, dateStr });
          }
        }
      }

      // 按日期倒序，同日期内按优先级排序
      results.sort((a, b) => {
        if (a.dateStr !== b.dateStr) return b.dateStr.localeCompare(a.dateStr);
        return (PRIORITY_ORDER[a.priority] ?? 2) - (PRIORITY_ORDER[b.priority] ?? 2);
      });

      return results;
    }

    // 获取所有项目（去重）
    function getAllProjects() {
      const data = loadData();
      const projectSet = new Set();
      for (const todos of Object.values(data.todos)) {
        for (const todo of todos) {
          if (todo.project) projectSet.add(todo.project);
        }
      }
      return [...projectSet].sort();
    }

    // 渲染搜索结果
    function renderSearchResults() {
      const todoList = document.getElementById('todoList');
      const todoCount = document.getElementById('todoCount');
      const sectionTitle = document.querySelector('.section-title');

      const results = searchTodos(searchQuery, searchProjectFilter);
      todoCount.textContent = `搜索结果 ${results.length} 条`;
      sectionTitle.innerHTML = '<span class="icon">🔍</span> 搜索结果';

      if (results.length === 0) {
        todoList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">没有找到匹配的待办事项</div>
          </div>
        `;
        return;
      }

      todoList.innerHTML = results.map(todo => {
        const dateLabel = formatDateChinese(todo.dateStr);
        return `
          <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
            <div class="checkbox ${todo.completed ? 'checked' : ''}" data-id="${todo.id}"></div>
            <div class="todo-content">
              <div class="todo-text">${highlightText(todo.text, searchQuery)}</div>
              <div class="todo-meta">
                <span class="todo-tag" style="background:#F3F4F6;color:#6B7280;">${dateLabel}</span>
                ${todo.project ? `<span class="todo-tag tag-project">${highlightText(todo.project, searchQuery)}</span>` : ''}
                ${todo.priority === 'urgent' ? '<span class="todo-tag tag-urgent">紧急</span>' : ''}
                ${todo.priority === 'important' ? '<span class="todo-tag tag-important">重要</span>' : ''}
              </div>
              ${todo.note ? `
                <div class="todo-note">
                  <span class="note-icon">📝</span>
                  ${highlightText(todo.note, searchQuery)}
                </div>
              ` : ''}
            </div>
          </div>
          <div class="divider"></div>
        `;
      }).join('');
    }

    // 执行搜索
    function performSearch() {
      searchQuery = document.getElementById('searchInput').value.trim();
      const clearBtn = document.getElementById('searchClear');

      if (searchQuery) {
        clearBtn.classList.add('visible');
        renderSearchResults();

        const sectionTitle = document.querySelector('.section-title');
        sectionTitle.innerHTML = '<span class="icon">📋</span> 今日待办';
        renderTodoList();
      }

    // 清除搜索
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      searchQuery = '';
      searchProjectFilter = '';
      document.getElementById('searchClear').classList.remove('visible');
      const sectionTitle = document.querySelector('.section-title');
      sectionTitle.innerHTML = '<span class="icon">📋</span> 今日待办';
      renderTodoList();
    }

    // 初始化搜索事件
    function initSearchEvents() {
      const searchInput = document.getElementById('searchInput');

      // 实时搜索（防抖）
      let searchTimer = null;
      searchInput.addEventListener('input', () => {

      });

      // ESC 清除搜索
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          clearSearch();
          searchInput.blur();
        }

      document.getElementById('searchClear').addEventListener('click', clearSearch);
    }
