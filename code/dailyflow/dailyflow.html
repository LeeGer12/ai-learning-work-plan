<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyFlow - 工作日报助手</title>
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #F8F9FC;
      color: #111827;
      min-height: 100vh;
    }

    /* ========== 顶部导航栏 ========== */
    .top-bar {
      background: #FFFFFF;
      height: 56px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #3B82F6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .logo-sub {
      font-size: 12px;
      color: #6B7280;
      margin-left: 4px;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .search-box {
      position: relative;
      width: 280px;
    }

    .search-input {
      width: 100%;
      height: 36px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 0 14px 0 36px;
      font-size: 13px;
      color: #111827;
      background: #F8F9FC;
      outline: none;
      transition: all 0.15s;
    }

    .search-input::placeholder {
      color: #9CA3AF;
    }

    .search-input:focus {
      background: #FFFFFF;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #9CA3AF;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .template-btn {
      height: 36px;
      padding: 0 14px;
      background: #FFFFFF;
      color: #374151;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .template-btn:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .date-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #E5E7EB;
      background: #FFFFFF;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #374151;
      transition: all 0.15s;
    }

    .date-btn:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    .date-display {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      min-width: 200px;
      text-align: center;
    }

    .date-weekday {
      font-size: 12px;
      color: #6B7280;
      font-weight: 400;
    }

    /* ========== 主内容区 ========== */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      gap: 24px;
      min-height: calc(100vh - 56px);
    }

    /* ========== 左侧：日历导航 ========== */
    .calendar-section {
      width: 290px;
      min-width: 290px;
    }

    .calendar-card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 28px 28px 24px;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-month {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .calendar-nav-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: #F3F4F6;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #374151;
      transition: all 0.15s;
    }

    .calendar-nav-btn:hover {
      background: #E5E7EB;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      margin-bottom: 8px;
    }

    .calendar-weekday {
      font-size: 11px;
      color: #9CA3AF;
      text-align: center;
      padding: 0;
      font-weight: 400;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px 0;
    }

    .calendar-day-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
    }

    .calendar-day-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .calendar-day-circle:hover {
      background: #F3F4F6;
    }

    .calendar-day-num {
      font-size: 11px;
      color: #6B7280;
      font-weight: 400;
      line-height: 1;
    }

    /* 有记录的日期：蓝底白字 + 表情 */
    .calendar-day-circle.has-record {
      background: #3B82F6;
    }

    .calendar-day-circle.has-record .day-emoji {
      font-size: 14px;
      line-height: 1;
    }

    .calendar-day-wrapper.has-record .calendar-day-num {
      color: #3B82F6;
      font-weight: 600;
    }

    /* 今天 */
    .calendar-day-circle.today {
      background: #3B82F6;
    }

    .calendar-day-circle.today .day-emoji {
      font-size: 14px;
      line-height: 1;
    }

    .calendar-day-wrapper.today .calendar-day-num {
      color: #3B82F6;
      font-weight: 600;
    }

    /* 其他月份 */
    .calendar-day-num.other-month {
      color: #D1D5DB;
    }

    /* ========== 中间：待办列表 ========== */
    .todo-section {
      flex: 1;
      min-width: 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #F3F4F6;
      margin-bottom: 4px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .icon {
      font-size: 18px;
    }

    .todo-count {
      font-size: 12px;
      color: #6B7280;
      background: #F3F4F6;
      padding: 2px 10px;
      border-radius: 12px;
    }

    /* ========== 待办卡片 ========== */
    .todo-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 4px 0;
      margin-bottom: 16px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      transition: background 0.15s;
      border-radius: 8px;
      margin: 4px 8px;
    }

    .todo-item:hover {
      background: #F8F9FC;
    }

    .todo-item:hover .todo-delete {
      opacity: 1;
    }

    /* 复选框 */
    .checkbox {
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 2px solid #D1D5DB;
      border-radius: 4px;
      margin-top: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .checkbox:hover {
      border-color: #3B82F6;
    }

    .checkbox.checked {
      background: #3B82F6;
      border-color: #3B82F6;
    }

    .checkbox.checked::after {
      content: "✓";
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    /* 待办内容 */
    .todo-content {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 14px;
      color: #111827;
      line-height: 1.5;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #9CA3AF;
    }

    .todo-note {
      font-size: 12px;
      color: #6B7280;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .todo-note .note-icon {
      font-size: 12px;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .todo-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .tag-project {
      background: #EFF6FF;
      color: #3B82F6;
    }

    .tag-urgent {
      background: #FEF2F2;
      color: #EF4444;
    }

    .tag-important {
      background: #FFF7ED;
      color: #F59E0B;
    }

    .tag-normal {
      background: #F3F4F6;
      color: #6B7280;
    }

    /* 操作按钮 */
    .todo-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .todo-action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #9CA3AF;
      transition: all 0.15s;
    }

    .todo-action-btn:hover {
      background: #F3F4F6;
      color: #374151;
    }

    .todo-action-btn.delete:hover {
      background: #FEF2F2;
      color: #EF4444;
    }

    /* ========== 添加待办 ========== */
    .add-todo {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .add-input {
      flex: 1;
      height: 40px;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      color: #111827;
      background: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-input::placeholder {
      color: #9CA3AF;
    }

    .add-input:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .add-btn {
      height: 40px;
      padding: 0 20px;
      background: #3B82F6;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #2563EB;
    }

    /* ========== 右侧：侧边栏 ========== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 快捷操作卡片 */
    .action-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .action-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      width: 100%;
      height: 44px;
      background: #3B82F6;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      margin-bottom: 10px;
    }

    .btn-primary:hover {
      background: #2563EB;
    }

    .btn-secondary {
      width: 100%;
      height: 40px;
      background: #FFFFFF;
      color: #374151;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }

    /* 时间轴 */
    .timeline-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .timeline-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      position: relative;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 24px;
      bottom: -12px;
      width: 2px;
      background: #E5E7EB;
    }

    .timeline-item:last-child::before {
      display: none;
    }

    .timeline-dot {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      z-index: 1;
    }

    .timeline-dot.add {
      background: #EFF6FF;
    }

    .timeline-dot.complete {
      background: #ECFDF5;
    }

    .timeline-dot.edit {
      background: #FFF7ED;
    }

    .timeline-info {
      flex: 1;
      min-width: 0;
    }

    .timeline-text {
      font-size: 13px;
      color: #374151;
      line-height: 1.4;
    }

    .timeline-time {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 2px;
    }

    /* 本周概览 */
    .week-stats-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .week-stats-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .week-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 80px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .week-bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .week-bar {
      width: 100%;
      background: #E5E7EB;
      border-radius: 4px 4px 0 0;
      position: relative;
      min-height: 4px;
    }

    .week-bar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #3B82F6;
      border-radius: 4px 4px 0 0;
      transition: height 0.3s ease;
    }

    .week-bar-label {
      font-size: 11px;
      color: #6B7280;
    }

    .week-summary {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid #F3F4F6;
    }

    .week-summary-item {
      text-align: center;
    }

    .week-summary-value {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .week-summary-label {
      font-size: 11px;
      color: #6B7280;
      margin-top: 2px;
    }

    /* 统计卡片 */
    .stats-card {
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .stats-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stats-label {
      font-size: 12px;
      color: #6B7280;
    }

    .stats-value {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
    }

    .stats-value .unit {
      font-size: 14px;
      font-weight: 400;
      color: #6B7280;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #F3F4F6;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-fill {
      height: 100%;
      background: #10B981;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #6B7280;
      text-align: right;
      margin-top: 4px;
    }

    /* ========== 日报预览弹窗 ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      width: 560px;
      max-width: 90vw;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      color: #6B7280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: #F3F4F6;
      color: #111827;
    }

    .modal-body {
      padding: 16px 24px;
    }

    .report-preview {
      background: #F8F9FC;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      color: #111827;
      white-space: pre-wrap;
      min-height: 120px;
    }

    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      height: 40px;
      padding: 0 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .modal-btn.primary {
      background: #3B82F6;
      color: #FFFFFF;
      border: none;
    }

    .modal-btn.primary:hover {
      background: #2563EB;
    }

    .modal-btn.secondary {
      background: #FFFFFF;
      color: #374151;
      border: 1px solid #E5E7EB;
    }

    .modal-btn.secondary:hover {
      background: #F3F4F6;
    }

    /* ========== 空状态 ========== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9CA3AF;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state .empty-text {
      font-size: 14px;
    }

    /* ========== 分割线 ========== */
    .divider {
      height: 1px;
      background: #E5E7EB;
      margin: 4px 8px;
    }

    /* ========== 提示消息 ========== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111827;
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      transition: transform 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ===== 顶部导航栏 ===== -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-icon">D</div>
      <span class="logo-text">DailyFlow</span>
      <span class="logo-sub">工作日报助手</span>
    </div>

    <div class="top-bar-center">
      <div class="date-nav">
        <button class="date-btn" id="prevDay">◀</button>

  <!-- ===== JavaScript ===== -->
  <script>
    // ========== 1.2 数据模型 ==========

    // UUID生成
    function generateId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // 创建Todo对象
    function createTodo(text, project = '', priority = 'normal') {
      return {
        id: generateId(),
        text: text,
        completed: false,
        project: project,
        priority: priority, // urgent | important | normal
        note: '',
        createdAt: new Date().toISOString(),
        completedAt: null
      };
    }

    // 创建TimelineEvent对象
    function createTimelineEvent(type, todoId, description) {
      return {
        id: generateId(),
        type: type, // add | complete | edit | delete
        todoId: todoId,
        timestamp: new Date().toISOString(),
        description: description
      };
    }

    // 初始数据结构
    function getInitialData() {
      return {
        todos: {},        // { "2026-06-16": [todo1, todo2, ...] }
        projects: ['获嘉名仕', '3号楼', '日常'],
        templates: [
          { id: generateId(), name: '对接甲方', text: '对接甲方，确认方案' },
          { id: generateId(), name: '方案深化', text: '方案深化设计' },
          { id: generateId(), name: '工地巡场', text: '工地巡场，跟进进度' }
        ],
        timeline: {}      // { "2026-06-16": [event1, event2, ...] }
      };
    }

    // 日期格式化工具
    function formatDate(date) {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDateChinese(date) {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      return `${year}年${month}月${day}日`;
    }

    function getWeekday(date) {
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return days[new Date(date).getDay()];
    }

    console.log('DailyFlow 数据模型已加载');

    // ========== 1.3 localStorage封装 ==========

    const STORAGE_KEY = 'dailyflow_data';

    // 保存数据到localStorage
    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch (e) {
        console.error('保存数据失败:', e);
        return false;
      }
    }

    // 从localStorage读取数据
    function loadData() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
          return JSON.parse(data);
        }
        // 首次使用，返回初始数据
        const initialData = getInitialData();
        saveData(initialData);
        return initialData;
      } catch (e) {
        console.error('读取数据失败:', e);
        return getInitialData();
      }
    }

    // 获取指定日期的待办列表
    function getTodosByDate(dateStr) {
      const data = loadData();
      return data.todos[dateStr] || [];
    }

    // 保存指定日期的待办列表
    function saveTodosByDate(dateStr, todos) {
      const data = loadData();
      data.todos[dateStr] = todos;
      saveData(data);
    }

    // 添加待办
    function addTodo(dateStr, text, project, priority) {
      const data = loadData();
      if (!data.todos[dateStr]) {
        data.todos[dateStr] = [];
      }
      const todo = createTodo(text, project, priority);
      data.todos[dateStr].push(todo);

      // 添加时间轴事件
      if (!data.timeline[dateStr]) {
        data.timeline[dateStr] = [];
      }
      data.timeline[dateStr].push(createTimelineEvent('add', todo.id, `添加待办「${text}」`));

      saveData(data);
      return todo;
    }

    // 切换待办完成状态
    function toggleTodo(dateStr, todoId) {
      const data = loadData();
      const todos = data.todos[dateStr] || [];
      const todo = todos.find(t => t.id === todoId);

      if (todo) {
        todo.completed = !todo.completed;
        todo.completedAt = todo.completed ? new Date().toISOString() : null;

        // 添加时间轴事件
        if (!data.timeline[dateStr]) {
          data.timeline[dateStr] = [];
        }
        const eventType = todo.completed ? 'complete' : 'add';
        const eventDesc = todo.completed ? `完成「${todo.text}」` : `重新打开「${todo.text}」`;
        data.timeline[dateStr].push(createTimelineEvent(eventType, todo.id, eventDesc));

        saveData(data);
      }
      return todo;
    }

    // 删除待办
    function deleteTodo(dateStr, todoId) {
      const data = loadData();
      const todos = data.todos[dateStr] || [];
      const index = todos.findIndex(t => t.id === todoId);

      if (index > -1) {
        const deletedTodo = todos.splice(index, 1)[0];

        // 添加时间轴事件
        if (!data.timeline[dateStr]) {
          data.timeline[dateStr] = [];
        }
        data.timeline[dateStr].push(createTimelineEvent('delete', todoId, `删除待办「${deletedTodo.text}」`));

        saveData(data);
        return deletedTodo;
      }
      return null;
    }

    // 获取指定日期的时间轴事件
    function getTimelineByDate(dateStr) {
      const data = loadData();
      return data.timeline[dateStr] || [];
    }

    // 获取项目列表
    function getProjects() {
      const data = loadData();
      return data.projects;
    }

    console.log('DailyFlow localStorage封装已加载');

    // ========== 1.4 待办添加功能 ==========

    // 当前日期状态
    let currentDate = new Date();

    // 渲染待办列表
    function renderTodoList() {
      const dateStr = formatDate(currentDate);
      const todos = getTodosByDate(dateStr);
      const todoList = document.getElementById('todoList');
      const todoCount = document.getElementById('todoCount');

      // 更新计数
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      todoCount.textContent = `已完成 ${completed} / 共 ${total}`;

      // 渲染列表
      if (todos.length === 0) {
        todoList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">暂无待办事项，添加一个吧</div>
          </div>
        `;
        return;
      }

      todoList.innerHTML = todos.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
          <div class="checkbox ${todo.completed ? 'checked' : ''}" data-id="${todo.id}"></div>
          <div class="todo-content">
            <div class="todo-text">${escapeHtml(todo.text)}</div>
            ${todo.project || todo.priority !== 'normal' ? `
              <div class="todo-meta">
                ${todo.project ? `<span class="todo-tag tag-project">${escapeHtml(todo.project)}</span>` : ''}
                ${todo.priority === 'urgent' ? '<span class="todo-tag tag-urgent">紧急</span>' : ''}
                ${todo.priority === 'important' ? '<span class="todo-tag tag-important">重要</span>' : ''}
              </div>
            ` : ''}
            ${todo.note ? `
              <div class="todo-note">
                <span class="note-icon">📝</span>
                ${escapeHtml(todo.note)}
              </div>
            ` : ''}
          </div>
          <div class="todo-actions">
            <button class="todo-action-btn" title="备注" data-action="note" data-id="${todo.id}">📝</button>
            <button class="todo-action-btn delete" title="删除" data-action="delete" data-id="${todo.id}">✕</button>
          </div>
        </div>
        <div class="divider"></div>
      `).join('');

      // 更新统计
      updateStats(todos);
    }

    // HTML转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 更新今日统计
    function updateStats(todos) {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('statsValue').innerHTML = `${completed} <span class="unit">/ ${total}</span>`;
      document.getElementById('progressFill').style.width = `${rate}%`;
      document.getElementById('progressText').textContent = `${rate}%`;
    }

    // 添加待办
    function handleAddTodo() {
      const input = document.getElementById('addInput');
      const text = input.value.trim();

      if (!text) {
        showToast('请输入待办内容');
        return;
      }

      const dateStr = formatDate(currentDate);
      addTodo(dateStr, text, '', 'normal');

      input.value = '';
      renderTodoList();
      renderTimeline();
      showToast('待办已添加');
    }

    // 显示提示消息
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 初始化添加待办事件
    function initAddTodoEvents() {
      const addInput = document.getElementById('addInput');
      const addBtn = document.getElementById('addBtn');

      // 回车添加
      addInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleAddTodo();
        }
      });

      // 按钮添加
      addBtn.addEventListener('click', handleAddTodo);
    }

    console.log('DailyFlow 待办添加功能已加载');

    // ========== 1.5 待办完成/取消 ==========

    // 初始化待办列表事件委托
    function initTodoListEvents() {
      const todoList = document.getElementById('todoList');

      todoList.addEventListener('click', (e) => {
        const target = e.target;

        // 复选框点击
        if (target.classList.contains('checkbox')) {
          const todoId = target.dataset.id;
          const dateStr = formatDate(currentDate);
          toggleTodo(dateStr, todoId);
          renderTodoList();
          renderTimeline();
        }
      });
    }

    console.log('DailyFlow 待办完成功能已加载');

    // ========== 1.6 待办删除功能 ==========

    // 在initTodoListEvents中添加删除事件
    function initDeleteEvents() {
      const todoList = document.getElementById('todoList');

      todoList.addEventListener('click', (e) => {
        const target = e.target;

        // 删除按钮点击
        if (target.closest('[data-action="delete"]')) {
          const todoId = target.closest('[data-action="delete"]').dataset.id;
          handleDeleteTodo(todoId);
        }
      });
    }

    // 处理删除待办
    function handleDeleteTodo(todoId) {
      if (!confirm('确定要删除这个待办吗？')) {
        return;
      }

      const dateStr = formatDate(currentDate);
      deleteTodo(dateStr, todoId);
      renderTodoList();
      renderTimeline();
      showToast('待办已删除');
    }

    console.log('DailyFlow 待办删除功能已加载');

    // ========== 1.7 日期切换功能 ==========

    // 更新日期显示
    function updateDateDisplay() {
      const dateDisplay = document.getElementById('dateDisplay');
      dateDisplay.innerHTML = `${formatDateChinese(currentDate)} <span class="date-weekday">${getWeekday(currentDate)}</span>`;
    }

    // 切换到前一天
    function goToPrevDay() {
      currentDate.setDate(currentDate.getDate() - 1);
      updateDateDisplay();
      renderTodoList();
      renderTimeline();
    }

    // 切换到后一天
    function goToNextDay() {
      currentDate.setDate(currentDate.getDate() + 1);
      updateDateDisplay();
      renderTodoList();
      renderTimeline();
    }

    // 初始化日期切换事件
    function initDateNavEvents() {
      document.getElementById('prevDay').addEventListener('click', goToPrevDay);
      document.getElementById('nextDay').addEventListener('click', goToNextDay);
    }

    // 渲染时间轴
    function renderTimeline() {
      const dateStr = formatDate(currentDate);
      const events = getTimelineByDate(dateStr);
      const timelineList = document.getElementById('timelineList');

      if (events.length === 0) {
        timelineList.innerHTML = `
          <div class="empty-state" style="padding: 20px 0;">
            <div class="empty-text" style="font-size: 12px;">暂无操作记录</div>
          </div>
        `;
        return;
      }

      // 按时间倒序显示
      const sortedEvents = [...events].reverse();

      timelineList.innerHTML = sortedEvents.map(event => {
        const time = new Date(event.timestamp);
        const timeStr = `${String(time.getHours()).padStart(2, '0')}:${String(time.getMinutes()).padStart(2, '0')}`;

        let dotClass = 'add';
        let icon = '➕';
        if (event.type === 'complete') {
          dotClass = 'complete';
          icon = '✓';
        } else if (event.type === 'edit') {
          dotClass = 'edit';
          icon = '✏️';
        } else if (event.type === 'delete') {
          dotClass = 'edit';
          icon = '🗑️';
        }

        return `
          <div class="timeline-item">
            <div class="timeline-dot ${dotClass}">${icon}</div>
            <div class="timeline-info">
              <div class="timeline-text">${escapeHtml(event.description)}</div>
              <div class="timeline-time">${timeStr}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 初始化应用
    function initApp() {
      updateDateDisplay();
      renderTodoList();
      renderTimeline();
      initAddTodoEvents();
      initTodoListEvents();
      initDeleteEvents();
      initDateNavEvents();
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initApp);

    console.log('DailyFlow 日期切换功能已加载');

    // ========== 阶段二：日历导航 ==========

    // 日历状态
    let calendarMonth = currentDate.getMonth();
    let calendarYear = currentDate.getFullYear();

    // 表情列表（用于有记录的日期）
    const emojis = ['😊', '😄', '😌', '😎', '🤩', '✨', '💪', '🎯'];

    // 随机获取一个表情
    function getRandomEmoji(dateStr) {
      // 使用日期作为种子，确保同一天显示相同表情
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash = hash & hash;
      }
      return emojis[Math.abs(hash) % emojis.length];
    }

    // 渲染日历
    function renderCalendar() {
      const calendarDays = document.getElementById('calendarDays');
      const calendarMonthEl = document.getElementById('calendarMonth');

      // 更新月份显示
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];
      calendarMonthEl.textContent = `${monthNames[calendarMonth]} ${calendarYear}`;

      // 计算月份信息
      const firstDay = new Date(calendarYear, calendarMonth, 1);
      const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
      const daysInMonth = lastDay.getDate();

      // 计算第一天是周几（周一为0）
      let startDay = firstDay.getDay() - 1;
      if (startDay < 0) startDay = 6;

      // 获取上个月末尾几天
      const prevMonthLastDay = new Date(calendarYear, calendarMonth, 0).getDate();

      // 获取今天日期
      const today = new Date();
      const todayStr = formatDate(today);

      // 获取当前选中日期
      const selectedStr = formatDate(currentDate);

      // 获取有待办的日期
      const data = loadData();
      const datesWithTodos = new Set(Object.keys(data.todos).filter(key => data.todos[key].length > 0));

      let html = '';
      let dayCount = 1;
      let nextMonthDay = 1;

      // 渲染6行
      for (let row = 0; row < 6; row++) {
        // 渲染7列
        for (let col = 0; col < 7; col++) {
          const index = row * 7 + col;

          if (index < startDay) {
            // 上个月的日期
            const prevDay = prevMonthLastDay - startDay + index + 1;
            const prevMonth = calendarMonth === 0 ? 11 : calendarMonth - 1;
            const prevYear = calendarMonth === 0 ? calendarYear - 1 : calendarYear;
            const prevDateStr = `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}-${String(prevDay).padStart(2, '0')}`;

            html += renderCalendarDay(prevDay, prevDateStr, true, false, false, datesWithTodos.has(prevDateStr));
          } else if (dayCount <= daysInMonth) {
            // 本月的日期
            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(dayCount).padStart(2, '0')}`;
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedStr;
            const hasRecord = datesWithTodos.has(dateStr);

            html += renderCalendarDay(dayCount, dateStr, false, isToday, isSelected, hasRecord);
            dayCount++;
          } else {
            // 下个月的日期
            const nextMonth = calendarMonth === 11 ? 0 : calendarMonth + 1;
            const nextYear = calendarMonth === 11 ? calendarYear + 1 : calendarYear;
            const nextDateStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(nextMonthDay).padStart(2, '0')}`;

            html += renderCalendarDay(nextMonthDay, nextDateStr, true, false, false, datesWithTodos.has(nextDateStr));
            nextMonthDay++;
          }
        }
      }

      calendarDays.innerHTML = html;
    }

    // 渲染单个日历日期
    function renderCalendarDay(day, dateStr, isOtherMonth, isToday, isSelected, hasRecord) {
      let wrapperClass = 'calendar-day-wrapper';
      let circleClass = 'calendar-day-circle';
      let numClass = 'calendar-day-num';
      let emoji = '';

      if (isOtherMonth) {
        numClass += ' other-month';
      }

      if (isToday) {
        wrapperClass += ' today';
        circleClass += ' today';
        emoji = getRandomEmoji(dateStr);
      } else if (hasRecord && !isOtherMonth) {
        wrapperClass += ' has-record';
        circleClass += ' has-record';
        emoji = getRandomEmoji(dateStr);
      }

      return `
        <div class="${wrapperClass}" data-date="${dateStr}">
          <div class="${circleClass}">
            ${emoji ? `<span class="day-emoji">${emoji}</span>` : ''}
          </div>
          <span class="${numClass}">${day}</span>
        </div>
      `;
    }

    console.log('DailyFlow 日历渲染已加载');

    // ========== 2.2 月份切换 ==========

    // 切换到上个月
    function goToPrevMonth() {
      calendarMonth--;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear--;
      }
      renderCalendar();
    }

    // 切换到下个月
    function goToNextMonth() {
      calendarMonth++;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear++;
      }
      renderCalendar();
    }

    // 初始化月份切换事件
    function initCalendarNavEvents() {
      document.getElementById('prevMonth').addEventListener('click', goToPrevMonth);
      document.getElementById('nextMonth').addEventListener('click', goToNextMonth);
    }

    console.log('DailyFlow 月份切换已加载');

    // ========== 2.5 日期点击跳转 ==========

    // 初始化日历点击事件
    function initCalendarClickEvents() {
      const calendarDays = document.getElementById('calendarDays');

      calendarDays.addEventListener('click', (e) => {
        const wrapper = e.target.closest('[data-date]');
        if (!wrapper) return;

        const dateStr = wrapper.dataset.date;
        if (!dateStr) return;

        // 更新当前日期
        currentDate = new Date(dateStr + 'T00:00:00');

        // 更新日历月份（如果点击的是其他月份的日期）
        const clickedMonth = currentDate.getMonth();
        const clickedYear = currentDate.getFullYear();
        if (clickedMonth !== calendarMonth || clickedYear !== calendarYear) {
          calendarMonth = clickedMonth;
          calendarYear = clickedYear;
        }

        // 更新显示
        updateDateDisplay();
        renderCalendar();
        renderTodoList();
        renderTimeline();
      });
    }

    // 更新initApp函数
    function initApp() {
      // 同步日历月份
      calendarMonth = currentDate.getMonth();
      calendarYear = currentDate.getFullYear();

      updateDateDisplay();
      renderCalendar();
      renderTodoList();
      renderTimeline();
      initAddTodoEvents();
      initTodoListEvents();
      initDeleteEvents();
      initDateNavEvents();
      initCalendarNavEvents();
      initCalendarClickEvents();
    }

    console.log('DailyFlow 日期点击跳转已加载');

    // ========== 阶段三：生成日报 ==========

    // 3.1 日报生成逻辑
    function generateReport() {
      const dateStr = formatDate(currentDate);
      const todos = getTodosByDate(dateStr);
      const completedTodos = todos.filter(t => t.completed);

      // 3.4 空数据处理
      if (completedTodos.length === 0) {
        showToast('请先勾选已完成的待办事项');
        return null;
      }

      // 拼装日报文本
      const date = new Date(currentDate);
      const month = date.getMonth() + 1;
      const day = date.getDate();

      let report = `${month}月${day}日工作日报：\n`;
      completedTodos.forEach((todo, index) => {
        report += `${index + 1}.${todo.text}。\n`;
      });

      return report;
    }

    console.log('DailyFlow 日报生成逻辑已加载');

    // ========== 3.2 预览弹窗 ==========

    // 显示日报预览弹窗
    function showReportModal() {
      const report = generateReport();
      if (!report) return;

      const modal = document.getElementById('reportModal');
      const content = document.getElementById('reportContent');
      content.textContent = report;
      modal.classList.add('active');
    }

    // 关闭日报预览弹窗
    function closeReportModal() {
      const modal = document.getElementById('reportModal');
      modal.classList.remove('active');
    }

    // 初始化弹窗事件
    function initModalEvents() {
      // 生成日报按钮
      document.getElementById('generateReport').addEventListener('click', showReportModal);

      // 关闭按钮
      document.getElementById('closeModal').addEventListener('click', closeReportModal);
      document.getElementById('closeReport').addEventListener('click', closeReportModal);

      // 点击遮罩关闭
      document.getElementById('reportModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          closeReportModal();
        }
      });

      // ESC键关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeReportModal();
        }
      });
    }

    console.log('DailyFlow 预览弹窗已加载');

    // ========== 3.3 复制功能 ==========

    // 复制日报到剪贴板
    function copyReport() {
      const content = document.getElementById('reportContent');
      const text = content.textContent;

      // 使用现代API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('已复制到剪贴板');
          closeReportModal();
        }).catch(() => {
          // 降级方案
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    // 降级复制方案
    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();

      try {
        document.execCommand('copy');
        showToast('已复制到剪贴板');
        closeReportModal();
      } catch (err) {
        showToast('复制失败，请手动复制');
      }

      document.body.removeChild(textarea);
    }

    // 初始化复制事件
    function initCopyEvent() {
      document.getElementById('copyReport').addEventListener('click', copyReport);
    }

    // 更新initApp函数
    function initApp() {
      // 同步日历月份
      calendarMonth = currentDate.getMonth();
      calendarYear = currentDate.getFullYear();

      updateDateDisplay();
      renderCalendar();
      renderTodoList();
      renderTimeline();
      initAddTodoEvents();
      initTodoListEvents();
      initDeleteEvents();
      initDateNavEvents();
      initCalendarNavEvents();
      initCalendarClickEvents();
      initModalEvents();
      initCopyEvent();
    }

    console.log('DailyFlow 复制功能已加载');
    console.log('DailyFlow 第三阶段初始化完成');
  </script>

</body>
</html>
